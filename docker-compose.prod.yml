# Production Docker Compose for Application VM
# This VM runs the application services (backend, frontend, databases)
# Nginx reverse proxy runs on a separate VM

services:
  # Registry Database - stores school metadata
  postgres-registry:
    image: postgres:15-alpine
    container_name: rozvrhovac-registry-db
    environment:
      POSTGRES_DB: ${REGISTRY_DB_NAME:-rozvrhovac_registry}
      POSTGRES_USER: ${REGISTRY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${REGISTRY_DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - registry_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REGISTRY_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rozvrhovac-network
    # Expose port only to internal network (not to host)
    expose:
      - "5432"

  # Main PostgreSQL instance for school databases
  postgres:
    image: postgres:15-alpine
    container_name: rozvrhovac-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      # Allow creating databases
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rozvrhovac-network
    # Expose port only to internal network (not to host)
    expose:
      - "5432"

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rozvrhovac-backend
    environment:
      # Registry Database
      REGISTRY_DATABASE_URL: postgresql+asyncpg://${REGISTRY_DB_USER:-postgres}:${REGISTRY_DB_PASSWORD:-postgres}@postgres-registry:5432/${REGISTRY_DB_NAME:-rozvrhovac_registry}
      
      # Default Database Settings (for creating new school databases)
      DEFAULT_DB_HOST: postgres
      DEFAULT_DB_PORT: 5432
      DEFAULT_DB_USER: ${DB_USER:-postgres}
      DEFAULT_DB_PASSWORD: ${DB_PASSWORD:-postgres}
      
      # Legacy DATABASE_URL (for backward compatibility)
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/rozvrhovac
      
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      # CORS Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      
      # Application Settings
      PROJECT_NAME: ${PROJECT_NAME:-Rozvrhovac}
      API_V1_STR: ${API_V1_STR:-/api/v1}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rozvrhovac-network
    # Expose backend on internal port (nginx on other VM will proxy to this)
    expose:
      - "8000"
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rozvrhovac-frontend
    environment:
      # Frontend environment variables
      VITE_API_URL: ${VITE_API_URL:-http://api.yourdomain.com}
    restart: unless-stopped
    networks:
      - rozvrhovac-network
    # Expose frontend on internal port (nginx on other VM will proxy to this)
    expose:
      - "80"
    # Health check
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep nginx || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  registry_db_data:
    driver: local
  postgres_data:
    driver: local

networks:
  rozvrhovac-network:
    driver: bridge

